name: Update today xin wen lian bo

on:
  workflow_dispatch:
  schedule:
    # 东八区 (UTC+8), 所以要-8小时
    - cron: '30 12 * * *'

jobs:
  update:
    name: Update today xin wen lian bo
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npm run index
      - run: git config --local user.email "github-actions[bot]@github.com"
      - run: git config --local user.name "github-actions[bot]"
      - run: git add .
      # 判空: 当天节目尚未播出 / 抓取为空时, 不会有 diff, 此时跳过 commit, 避免任务变红失败
      - name: Commit if there are changes
        run: |
          if git diff --cached --quiet; then
            echo "No changes to commit, skipping."
          else
            git commit -m "AUTO UPDATE [bot]"
          fi
      - name: Push master changes
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: master
